services:
  backend:
    build:
      context: ./backend
    container_name: aura-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - aura_history_data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: aura-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://127.0.0.1:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  aura_history_data:
